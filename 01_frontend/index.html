<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScadaViewer</title>
    <!--
      Anti-FOUC: nastaví data-theme SYNCHRONNĚ před prvním paintem.
      React / useTheme() čte localStorage až po renderu → bez tohoto scriptu
      by uživatel s tmavým režimem viděl záblesk světlého UI (Flash of Unstyled Content).
      try/catch chrání před zablokovaným localStorage nebo chybějícím matchMedia.
    -->
    <script>
      (function () {
        try {
          var s = localStorage.getItem('scada_theme')
          var dark = s === 'dark' ||
            (s === null && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light')
        } catch (_) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
